<!doctype html>
<title>{% if player %}Edit{% else %}New{% endif %} player</title>
<h1>{% if player %}Edit{% else %}New{% endif %} player</h1>
<form method="post">
  Name: <input name="name" value="{{ player.name if player else '' }}"><br>
  Level: <input name="level" type="number" value="{{ player.level if player else 1 }}"><br>
  Score: <input name="score" type="number" value="{{ player.score if player else 0 }}"><br>
  <button>Save</button>
</form>
<a href="{{ url_for('index') }}">Back</a>
